openapi: 3.0.3
info:
  title: Kurae API
  description: REST API for Kurae — limited drops, inventory, checkout, and seller dashboard.
  version: 0.2.0
  contact:
    name: Kurae
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: health
  - name: auth
  - name: buyer
  - name: public
  - name: drops
  - name: orders
  - name: checkout
  - name: discounts
  - name: referrals
  - name: branding
  - name: analytics
  - name: uploads
  - name: webhooks
paths:
  /health:
    get:
      tags: [health]
      summary: Health check (postgres + redis)
      responses:
        "200":
          description: Dependencies healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReport"
        "503":
          description: One or more dependency checks failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReport"
  /auth/register:
    post:
      tags: [auth]
      summary: Register seller
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          $ref: "#/components/responses/Error"
  /auth/login:
    post:
      tags: [auth]
      summary: Seller login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Error"
  /auth/logout:
    post:
      tags: [auth]
      summary: Logout (client clears token)
      responses:
        "200":
          description: OK
  /auth/me:
    get:
      tags: [auth]
      summary: Current seller session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    $ref: "#/components/schemas/SellerSession"
        "401":
          $ref: "#/components/responses/Error"
  /auth/profile:
    patch:
      tags: [auth]
      summary: Update seller brand name
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/password:
    patch:
      tags: [auth]
      summary: Change seller password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password changed
        "401":
          $ref: "#/components/responses/Error"
  /auth/buyer/register:
    post:
      tags: [buyer, auth]
      summary: Register buyer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyerRegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          $ref: "#/components/responses/Error"
  /auth/buyer/login:
    post:
      tags: [buyer, auth]
      summary: Buyer login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Error"
  /auth/buyer/me:
    get:
      tags: [buyer, auth]
      summary: Current buyer session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    $ref: "#/components/schemas/BuyerSession"
        "401":
          $ref: "#/components/responses/Error"
  /auth/buyer/profile:
    patch:
      tags: [buyer, auth]
      summary: Update buyer display name
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/buyer/password:
    patch:
      tags: [buyer, auth]
      summary: Change buyer password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password changed
        "401":
          $ref: "#/components/responses/Error"
  /public/drops:
    get:
      tags: [public]
      summary: Public feed of live drops
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  drops:
                    type: array
                    items:
                      $ref: "#/components/schemas/PublicDrop"
  /public/{seller}/{drop}:
    get:
      tags: [public]
      summary: Public drop page data
      parameters:
        - $ref: "#/components/parameters/SellerSlug"
        - $ref: "#/components/parameters/DropSlug"
        - name: preview
          in: query
          schema:
            type: string
            enum: ["1"]
          description: Draft preview (requires seller Bearer token)
      responses:
        "200":
          description: Drop payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicDrop"
        "404":
          $ref: "#/components/responses/Error"
  /drops/{id}/waitlist:
    post:
      tags: [public]
      summary: Join drop waitlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Joined or already on list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  waitlistCount:
                    type: integer
        "429":
          $ref: "#/components/responses/Error"
  /public/sellers/{seller}:
    get:
      tags: [public]
      summary: Public seller profile for referral landing pages
      parameters:
        - name: seller
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicSeller"
        "404":
          $ref: "#/components/responses/Error"
  /public/referrals/click:
    post:
      tags: [public, referrals]
      summary: Record referral link click
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferralClickRequest"
      responses:
        "200":
          description: Recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "404":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /public/referrals/stats:
    get:
      tags: [public, referrals]
      summary: Referral funnel stats for a drop and code
      parameters:
        - name: dropId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stats (valid false if code not found or not scoped to drop)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralStats"
        "400":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /public/referrals/preview:
    get:
      tags: [public, referrals]
      summary: Referral link share preview (OG metadata)
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: sellerSlug
          in: query
          schema:
            type: string
        - name: dropSlug
          in: query
          schema:
            type: string
        - name: dropId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Preview (valid false if code not found or not scoped)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralPreview"
        "400":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /public/analytics/view:
    post:
      tags: [public, analytics]
      summary: Record drop page view and optional UTM campaign touch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sellerSlug:
                  type: string
                dropId:
                  type: string
                  format: uuid
                utmSource:
                  type: string
                utmMedium:
                  type: string
                utmCampaign:
                  type: string
                utmTerm:
                  type: string
                utmContent:
                  type: string
      responses:
        "200":
          description: Recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "404":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /drops:
    get:
      tags: [drops]
      summary: List seller drops
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  drops:
                    type: array
                    items:
                      $ref: "#/components/schemas/SellerDropRow"
    post:
      tags: [drops]
      summary: Create drop
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DropInput"
      responses:
        "201":
          description: Created
  /drops/{id}:
    get:
      tags: [drops]
      summary: Get drop by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DropId"
      responses:
        "200":
          description: OK
    patch:
      tags: [drops]
      summary: Update drop
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DropId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DropInput"
      responses:
        "200":
          description: Updated
    delete:
      tags: [drops]
      summary: Delete drop (blocked when orders exist)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DropId"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/Error"
        "409":
          description: Drop has orders and cannot be deleted
  /drops/{id}/clone:
    post:
      tags: [drops]
      summary: Clone drop as a new draft
      description: Copies content, products, images, and inventory totals into a new draft drop with fresh dates and a unique slug.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DropId"
      responses:
        "201":
          description: Cloned drop created
        "404":
          $ref: "#/components/responses/Error"
  /orders:
    get:
      tags: [orders]
      summary: Paginated seller orders
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/OrderStatus"
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, oldest]
            default: newest
        - name: from
          in: query
          description: Filter orders created on or after this time (RFC3339 or YYYY-MM-DD)
          schema:
            type: string
        - name: to
          in: query
          description: Filter orders created before this time (RFC3339 or YYYY-MM-DD, inclusive for date-only)
          schema:
            type: string
      responses:
        "200":
          description: OK
  /orders/export:
    get:
      tags: [orders]
      summary: Export seller orders as CSV
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/OrderStatus"
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, oldest]
            default: newest
        - name: from
          in: query
          description: Filter orders created on or after this time (RFC3339 or YYYY-MM-DD)
          schema:
            type: string
        - name: to
          in: query
          description: Filter orders created before this time (RFC3339 or YYYY-MM-DD, inclusive for date-only)
          schema:
            type: string
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/Error"
  /orders/{id}:
    get:
      tags: [orders]
      summary: Order detail
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
    patch:
      tags: [orders]
      summary: Update order status (ship or refund)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [ship, fulfill, refund]
                trackingNumber:
                  type: string
                  description: Required when action is ship or fulfill
      responses:
        "200":
          description: Updated order
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /dashboard/stats:
    get:
      tags: [orders]
      summary: Seller dashboard aggregates
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
  /discount-codes:
    get:
      tags: [discounts]
      summary: List seller discount codes
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  discountCodes:
                    type: array
                    items:
                      $ref: "#/components/schemas/DiscountCode"
    post:
      tags: [discounts]
      summary: Create discount code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscountCodeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  discountCode:
                    $ref: "#/components/schemas/DiscountCode"
        "409":
          $ref: "#/components/responses/Error"
  /discount-codes/{id}:
    patch:
      tags: [discounts]
      summary: Update discount code
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscountCodeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  discountCode:
                    $ref: "#/components/schemas/DiscountCode"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [discounts]
      summary: Delete discount code
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/Error"
        "409":
          description: Code has been used and cannot be deleted
  /referral-codes:
    get:
      tags: [referrals]
      summary: List seller referral codes
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  referralCodes:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReferralCode"
    post:
      tags: [referrals]
      summary: Create referral code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferralCodeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  referralCode:
                    $ref: "#/components/schemas/ReferralCode"
        "409":
          $ref: "#/components/responses/Error"
  /referral-codes/{id}:
    delete:
      tags: [referrals]
      summary: Delete referral code
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/Error"
        "409":
          description: Code has activity and cannot be deleted
  /referral-rewards/settings:
    get:
      tags: [referrals]
      summary: Get buyer referral reward settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
    patch:
      tags: [referrals]
      summary: Update buyer referral reward settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferralRewardSettings"
      responses:
        "200":
          description: Updated settings
  /buyer/referrals:
    get:
      tags: [referrals]
      summary: Buyer referral progress and earned rewards
      security:
        - bearerAuth: []
      parameters:
        - name: sellerSlug
          in: query
          schema:
            type: string
          description: When set, returns progress for one seller (creates personal code if needed)
      responses:
        "200":
          description: OK
  /branding:
    get:
      tags: [branding]
      summary: Get seller branding
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  branding:
                    $ref: "#/components/schemas/SellerBranding"
    patch:
      tags: [branding]
      summary: Update seller branding
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SellerBrandingInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  branding:
                    $ref: "#/components/schemas/SellerBranding"
  /team/members:
    get:
      tags: [team]
      summary: List shop team members (owner only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamMember"
    post:
      tags: [team]
      summary: Invite team member with role (owner only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name, password, role]
              properties:
                email:
                  type: string
                name:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [admin, staff]
      responses:
        "201":
          description: Created
  /team/members/{id}:
    patch:
      tags: [team]
      summary: Update team member (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, role]
              properties:
                name:
                  type: string
                role:
                  type: string
                  enum: [admin, staff]
      responses:
        "200":
          description: Updated
    delete:
      tags: [team]
      summary: Remove team member (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Removed
  /dashboard/analytics:
    get:
      tags: [analytics]
      summary: Seller analytics (traffic, funnel, revenue)
      security:
        - bearerAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            enum: [7, 30, 90]
            default: 7
        - name: dropId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerAnalytics"
        "400":
          $ref: "#/components/responses/Error"
  /dashboard/analytics/export:
    get:
      tags: [analytics]
      summary: Export seller analytics as CSV
      security:
        - bearerAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            enum: [7, 30, 90]
            default: 7
        - name: dropId
          in: query
          schema:
            type: string
            format: uuid
        - name: format
          in: query
          schema:
            type: string
            enum: [daily, drops]
            default: daily
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/Error"
  /checkout:
    post:
      tags: [checkout]
      summary: Reserve inventory and create payment intent
      description: >
        Buyer Bearer token is optional. Guest checkout sends buyerEmail in the body
        without authentication. When a buyer token is present, buyerEmail is taken
        from the token.
      parameters:
        - name: Idempotency-Key
          in: header
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "201":
          description: Checkout started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"
        "400":
          description: Invalid size or discount code
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          description: Sold out, drop not started/ended, or idempotency replay in progress
          $ref: "#/components/responses/Error"
  /checkout/discount/validate:
    post:
      tags: [checkout, discounts]
      summary: Preview discount for a drop (no reservation)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dropId, code]
              properties:
                dropId:
                  type: string
                  format: uuid
                code:
                  type: string
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscountPreview"
  /checkout/orders/{id}/status:
    get:
      tags: [checkout]
      summary: Buyer order status (poll after payment)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        "200":
          description: Order status for buyer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyerOrderStatus"
        "404":
          $ref: "#/components/responses/Error"
  /buyer/orders:
    get:
      tags: [buyer, orders]
      summary: Paginated buyer order history
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyerOrderListResponse"
        "401":
          $ref: "#/components/responses/Error"
  /uploads/presign:
    post:
      tags: [uploads]
      summary: Presigned S3 upload URL for product images
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, contentType, sizeBytes]
              properties:
                filename:
                  type: string
                contentType:
                  type: string
                  enum: [image/jpeg, image/png, image/webp]
                sizeBytes:
                  type: integer
                  format: int64
                  maximum: 5242880
                  description: File size in bytes (max 5MB)
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresignResponse"
  /webhooks/stripe:
    post:
      tags: [webhooks]
      summary: Stripe payment webhooks
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Processed
  /webhook-events:
    get:
      tags: [webhooks, orders]
      summary: List payment webhook events for the authenticated seller
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated webhook events scoped to the seller's orders
          content:
            application/json:
              schema:
                type: object
                required: [events, total, page]
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/SellerWebhookEvent"
                  total:
                    type: integer
                  page:
                    type: integer
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    SellerSlug:
      name: seller
      in: path
      required: true
      schema:
        type: string
    DropSlug:
      name: drop
      in: path
      required: true
      schema:
        type: string
    DropId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
  schemas:
    HealthReport:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ok, error]
        checks:
          type: object
          additionalProperties:
            type: string
            enum: [ok, error, skipped]
          example:
            postgres: ok
            redis: ok
    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
        slug:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        ok:
          type: boolean
        session:
          oneOf:
            - $ref: "#/components/schemas/SellerSession"
            - $ref: "#/components/schemas/BuyerSession"
        token:
          type: string
    BuyerRegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
        referralCode:
          type: string
          description: Optional referral code to attribute signup
        sellerSlug:
          type: string
          description: Seller slug when attributing referral signup
    SellerSession:
      type: object
      properties:
        role:
          type: string
          enum: [seller]
        email:
          type: string
        sellerSlug:
          type: string
        sellerName:
          type: string
        teamRole:
          type: string
          enum: [owner, admin, staff]
        memberName:
          type: string
    TeamMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, staff]
        createdAt:
          type: string
          format: date-time
    BuyerSession:
      type: object
      properties:
        role:
          type: string
          enum: [buyer]
        email:
          type: string
        name:
          type: string
    PublicDrop:
      type: object
      properties:
        id:
          type: string
        sellerSlug:
          type: string
        sellerName:
          type: string
        slug:
          type: string
        title:
          type: string
        description:
          type: string
        story:
          type: string
        priceCents:
          type: integer
        currency:
          type: string
        heroImageUrl:
          type: string
        galleryImageUrls:
          type: array
          items:
            type: string
        inventoryTotal:
          type: integer
        inventoryRemaining:
          type: integer
        waitlistCount:
          type: integer
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [upcoming, live, sold_out, expired]
        promoMessage:
          type: string
          nullable: true
        sizes:
          type: array
          items:
            $ref: "#/components/schemas/DropSize"
        products:
          type: array
          items:
            $ref: "#/components/schemas/DropProduct"
        sellerLogoUrl:
          type: string
        sellerAccent:
          type: string
          enum: [blush, dusk, teal]
        sellerBio:
          type: string
    DropProduct:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        priceCents:
          type: integer
        imageUrl:
          type: string
        sortOrder:
          type: integer
        inventoryTotal:
          type: integer
        inventoryRemaining:
          type: integer
        sizes:
          type: array
          items:
            $ref: "#/components/schemas/DropSize"
    SellerDropRow:
      allOf:
        - $ref: "#/components/schemas/PublicDrop"
        - type: object
          properties:
            publishStatus:
              type: string
              enum: [draft, scheduled, published]
            publicStatus:
              type: string
    DropSize:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        available:
          type: boolean
    DropInput:
      type: object
      required: [title, slug, priceCents, inventoryTotal, startsAt, endsAt]
      properties:
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        story:
          type: string
        priceCents:
          type: integer
        inventoryTotal:
          type: integer
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        promoMessage:
          type: string
          nullable: true
        heroImageUrl:
          type: string
        galleryImageUrls:
          type: array
          items:
            type: string
        sizes:
          type: array
          items:
            $ref: "#/components/schemas/DropSize"
        products:
          type: array
          items:
            $ref: "#/components/schemas/DropProduct"
        publishStatus:
          type: string
          enum: [draft, scheduled, published]
    OrderStatus:
      type: string
      enum: [reserved, payment_pending, paid, shipped, fulfilled, cancelled, refunded]
    ShippingAddress:
      type: object
      required: [name, line1, city, region, postalCode, country]
      properties:
        name:
          type: string
        line1:
          type: string
        line2:
          type: string
        city:
          type: string
        region:
          type: string
        postalCode:
          type: string
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
    DashboardStats:
      type: object
      properties:
        revenue7dCents:
          type: integer
        orderCount:
          type: integer
        paidCount:
          type: integer
        waitlistTotal:
          type: integer
    CheckoutRequest:
      type: object
      required: [dropId, buyerEmail, sizeLabel, shippingAddress]
      properties:
        dropId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
          description: Required when the drop has multiple products; omitted for single-product drops
        buyerEmail:
          type: string
          format: email
