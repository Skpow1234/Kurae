        sizeLabel:
          type: string
        idempotencyKey:
          type: string
        discountCode:
          type: string
        referralCode:
          type: string
        shippingAddress:
          $ref: "#/components/schemas/ShippingAddress"
    CheckoutResponse:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
        clientSecret:
          type: string
        checkoutUrl:
          type: string
          format: uri
        paymentProvider:
          type: string
