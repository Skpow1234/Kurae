          type: string
        status:
          $ref: "#/components/schemas/OrderStatus"
        sellerSlug:
          type: string
        dropSlug:
          type: string
        dropTitle:
          type: string
        productName:
          type: string
        sizeLabel:
          type: string
        amountCents:
          type: integer
        currency:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BuyerOrderListResponse:
      type: object
      properties:
