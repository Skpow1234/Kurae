        subtotalCents:
          type: integer
        discountCents:
          type: integer
        amountCents:
          type: integer
        currency:
          type: string
        reservationUntil:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/OrderStatus"
    SellerWebhookEvent:
