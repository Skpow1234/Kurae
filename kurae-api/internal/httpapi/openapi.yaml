          nullable: true
        usesCount:
          type: integer
        expiresAt:
          type: string
          format: date-time
          nullable: true
        dropId:
          type: string
          format: uuid
          nullable: true
        dropTitle:
          type: string
          nullable: true
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
