        sellerSlug:
          type: string
        dropSlug:
          type: string
        dropTitle:
          type: string
        productName:
          type: string
        sizeLabel:
          type: string
        subtotalCents:
          type: integer
        discountCents:
          type: integer
        discountCode:
          type: string
          nullable: true
        referralCode:
          type: string
          nullable: true
        amountCents:
          type: integer
        currency:
          type: string
        buyerEmail:
          type: string
        shippingAddress:
          $ref: "#/components/schemas/ShippingAddress"
        trackingNumber:
          type: string
        shippedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        events:
          type: array
          items:
            $ref: "#/components/schemas/OrderEvent"
    BuyerOrderListItem:
      type: object
      properties:
