services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kurae
      POSTGRES_PASSWORD: kurae
      POSTGRES_DB: kurae
    ports:
      - "5432:5432"
    volumes:
      - kurae_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kurae"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: ["migrate", "up"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://kurae:kurae@postgres:5432/kurae?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: ["api"]
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DATABASE_URL: postgres://kurae:kurae@postgres:5432/kurae?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: ["worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://kurae:kurae@postgres:5432/kurae?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kurae_pg:
