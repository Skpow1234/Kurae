services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kurae
      POSTGRES_PASSWORD: kurae
      POSTGRES_DB: kurae
    ports:
      - "5432:5432"
    volumes:
      - kurae_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kurae"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kurae_pg:
