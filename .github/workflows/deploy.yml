name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: all
        type: choice
        options:
          - all
          - api
          - web
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

  push:
    tags:
      - "v*.*.*"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/kurae-api

jobs:
  resolve-target:
    name: Resolve deploy target
    runs-on: ubuntu-latest
    outputs:
      deploy_api: ${{ steps.target.outputs.deploy_api }}
      deploy_web: ${{ steps.target.outputs.deploy_web }}
    steps:
      - id: target
        run: |
          case "${{ github.event_name }}" in
            push)
              echo "deploy_api=true" >> "$GITHUB_OUTPUT"
              echo "deploy_web=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              case "${{ github.event.inputs.target }}" in
                api)  echo "deploy_api=true" >> "$GITHUB_OUTPUT"; echo "deploy_web=false" >> "$GITHUB_OUTPUT" ;;
                web)  echo "deploy_api=false" >> "$GITHUB_OUTPUT"; echo "deploy_web=true" >> "$GITHUB_OUTPUT" ;;
                *)    echo "deploy_api=true" >> "$GITHUB_OUTPUT"; echo "deploy_web=true" >> "$GITHUB_OUTPUT" ;;
              esac
              ;;
          esac

  build-and-push-api:
    name: Build & push API image
    needs: [resolve-target]
    if: needs.resolve-target.outputs.deploy_api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: kurae-api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-api-fly:
    name: Deploy API (Fly.io)
    needs: [resolve-target, build-and-push-api]
    if: needs.resolve-target.outputs.deploy_api == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::notice::FLY_API_TOKEN not configured — skip Fly.io deploy."
            exit 0
          fi
          flyctl deploy --remote-only --config kurae-api/fly.toml --image "${{ env.API_IMAGE }}:latest"

  deploy-api-render:
    name: Deploy API (Render hook)
    needs: [resolve-target, build-and-push-api]
    if: needs.resolve-target.outputs.deploy_api == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Trigger Render deploy
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::notice::RENDER_DEPLOY_HOOK_URL not configured — skip Render deploy."
            exit 0
          fi
          curl -fsSL -X POST "$HOOK_URL"

  deploy-web-vercel:
    name: Deploy Web (Vercel)
    needs: [resolve-target]
    if: needs.resolve-target.outputs.deploy_web == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    defaults:
      run:
        working-directory: kurae-web
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: kurae-web/package-lock.json

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::notice::Vercel secrets not configured — skip web deploy."
            exit 0
          fi
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  smoke-test:
    name: Post-deploy smoke test
    needs: [deploy-api-fly, deploy-api-render]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        env:
          API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "::notice::PRODUCTION_API_URL not set — skip smoke test."
            exit 0
          fi
          curl -fsSL "${API_URL}/health" | grep -q '"status":"ok"'
